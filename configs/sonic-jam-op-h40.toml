schema_version = 3

[source]
path = "assets/SonicJamOp.avi"
fps = "30"
duration = "90.466667"
sar = "32:35"

[video]
mode = "H40"
width = 288
height = 200
fit = "pad"
master_denoise = false
# The TrueMotion source contains a one-pixel checkerboard dither. A radius-1
# guided filter suppresses that pattern on smooth areas while using the source
# itself as the guide to retain drawn edges and gentle sky gradients. eps=0.002
# keeps the edge threshold strict; planes=15 applies it to luma and chroma.
# The codec's normal position-fixed Bayer output dither remains enabled.
master_filter = "setsar=1,guided=radius=1:eps=0.002:planes=15"
raw_filter = "setsar=1"

[output]
directory = "videos/SonicJamOp_H40_288x200_adpcm22/tmp"
reuse = false
emit_decisions = true

[encoder]
cold_cap = 190

[palette]
algorithm = "mosaic-gm"

[analysis]
source_canvas = [320, 224]
