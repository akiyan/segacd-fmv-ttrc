schema_version = 1

[source]
path = "assets/BadApple.mp4"
fps = "30"
duration = "219.213021"
sar = "1:1"

[source.preprocess.endpoint_snap]
black_max = 2
white_min = 253

[video]
mode = "H32"
width = 256
height = 224
active_tiles = 896
fit = "crop"
resize_filter = "area"
master_denoise = false

[audio]
kind = "adpcm22"

[output]
directory = "videos/BadApple_H32_256x224_adpcm22/tmp"
reuse = false
emit_decisions = true

[encoder]
gpu = true
vram_tiles = 1535
dither = true
segment_palettes = true
near = true
coa = true

[palette]
algorithm = "mosaic-gm"
map_weight = 1.0
seam_weight = 8.0
seam_iterations = 2
sample_counts = [120, 240, 480]
validate_frames = 120
segment_train_frames = 240
segment_validate_frames = 60

[pack]
fill = true
startup_audio_frames = 30
output = "out/movieplay/MOVIE.DAT"
