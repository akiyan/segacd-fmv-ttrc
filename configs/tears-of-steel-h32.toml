schema_version = 1

[source]
path = "assets/TOS.mp4"
fps = "24"
duration = "116.564172"
sar = "1:1"

[video]
mode = "H32"
width = 256
height = 224
fit = "pad"

[audio]
kind = "pcm13"

[output]
directory = "videos/TOS_H32_256x224_pcm/tmp"
reuse = false
emit_decisions = true

[encoder]
gpu = true
vram_tiles = 1400
dither = true
segment_palettes = true
near = true
coa = true

[palette]
algorithm = "mosaic-gm"
map_weight = 1.0
seam_weight = 8.0
seam_iterations = 2
sample_counts = [120, 240, 480]
validate_frames = 120
segment_train_frames = 240
segment_validate_frames = 60

[pack]
debug = true
fill = true
startup_audio_frames = 30
output = "out/movieplay/MOVIE.DAT"
